version = 1
revision = 1

[[package]]
name = "sql-business-intelligence-openenv"
version = "1.0.0"
source = { editable = "." }
dependencies = [
    { name = "pydantic" },
    { name = "gradio" },
    { name = "openai" },
    { name = "fastapi" },
    { name = "uvicorn" },
    { name = "pyyaml" },
    { name = "openenv-core" },
]

[package.metadata]
requires-dist = [
    { name = "pydantic", specifier = ">=2.0,<3.0" },
    { name = "gradio", specifier = ">=4.0" },
    { name = "openai", specifier = ">=2.7.2" },
    { name = "fastapi", specifier = ">=0.110.0" },
    { name = "uvicorn", specifier = ">=0.29.0" },
    { name = "pyyaml", specifier = ">=6.0" },
    { name = "openenv-core", specifier = ">=0.2.0" },
]
